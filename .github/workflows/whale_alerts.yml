name: Whale Alerts

on:
  schedule:
    - cron: '*/5 * * * *'   # corre cada 5 minutos
  workflow_dispatch:         # permite correrlo a mano desde la pestaña "Actions"

permissions:
  contents: write            # necesario para guardar el estado (state.json)

jobs:
  check-whales:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Revisar apuestas fuertes
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          WHALE_THRESHOLD: '1000'
          TOP_N: '10'
          LB_CATEGORY: 'OVERALL'
          LB_PERIOD: 'DAY'
        run: python whale_alert_bot.py

      - name: Guardar el estado (para no repetir alertas)
        run: |
          git config user.name "whale-alert-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "actualizar estado"
          git push
