name: Whale Alerts (continuo)

on:
  schedule:
    - cron: '0 */6 * * *'   # arranca una tanda nueva cada 6 horas
  workflow_dispatch:         # para probarlo a mano

concurrency:
  group: whale-alerts
  cancel-in-progress: false  # evita que se solapen dos corridas al mismo tiempo

permissions:
  contents: write

jobs:
  watch-whales:
    runs-on: ubuntu-latest
    timeout-minutes: 355     # un poco menos que 6h, para que corte antes que GitHub
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Vigilar en bucle
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          WHALE_THRESHOLD: '1000'
          TOP_N: '10'
          LB_CATEGORY: 'OVERALL'
          LB_PERIOD: 'MONTH'
        run: python whale_alert_bot.py
